services:
  # --- Core Sori Services ---
  sori-backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      args:
        - SORI_COMMIT=${SORI_COMMIT:-unknown}
    # Ports will be managed by gateway
    expose:
      - "3000"
    environment:
      - PORT=${PORT}
      - NODE_ENV=${NODE_ENV}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - DESKTOP_APP_ORIGINS=${DESKTOP_APP_ORIGINS:-tauri://localhost,http://tauri.localhost,https://tauri.localhost,http://127.0.0.1:1420,http://localhost:1420}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - VALKEY_URL=${VALKEY_URL}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-25}
      - LIVEKIT_URL=${LIVEKIT_URL}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - PUBLIC_WEB_URL=${PUBLIC_WEB_URL}
      - PUBLIC_API_URL=${PUBLIC_API_URL}
      - PUBLIC_WS_URL=${PUBLIC_WS_URL}
      - PUBLIC_LIVEKIT_URL=${PUBLIC_LIVEKIT_URL}
      - PUBLIC_MEDIA_URL=${PUBLIC_MEDIA_URL}
      - PUBLIC_DEFAULT_COMMUNITY_ID=${PUBLIC_DEFAULT_COMMUNITY_ID:-default-community}
      - LOG_RETENTION_DAYS=${LOG_RETENTION_DAYS}
    depends_on:
      - valkey
      - sori-media
      - sori-livekit
      - postgres
    volumes:
      - sori_media:/app/apps/backend/uploads
      - ./backups:/app/backups
    networks:
      - sori-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sori-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:latest
    depends_on:
      - postgres
    volumes:
      - ./backups:/backups
      - ./infrastructure/backup/hooks:/hooks:ro
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - SCHEDULE=@every 24h
      - BACKUP_ON_START=TRUE
      - BACKUP_KEEP_DAYS=3
      - BACKUP_KEEP_WEEKS=0
      - BACKUP_KEEP_MONTHS=0
      - BACKUP_KEEP_MINS=1
      - BACKUP_LATEST_TYPE=none
    networks:
      - sori-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  sori-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_WS_URL=${VITE_WS_URL}
        - VITE_LIVEKIT_URL=${VITE_LIVEKIT_URL}
        - VITE_MAX_UPLOAD_SIZE_MB=${VITE_MAX_UPLOAD_SIZE_MB:-25}
    # Ports managed by gateway
    expose: 
      - "80"
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - VITE_WS_URL=${VITE_WS_URL}
      - VITE_LIVEKIT_URL=${VITE_LIVEKIT_URL}
      - VITE_MAX_UPLOAD_SIZE_MB=${VITE_MAX_UPLOAD_SIZE_MB:-25}
    depends_on:
      - sori-backend
    networks:
      - sori-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- Infrastructure Services ---
  sori-gateway:
    image: caddy:2-alpine
    container_name: sori-gateway
    ports:
      - "80:80"
      - "443:443"
    environment:
      - SORI_WEB_HOST=${SORI_WEB_HOST:-sori-web.sori.orb.local}
      - SORI_API_HOST=${SORI_API_HOST:-sori-backend.sori.orb.local}
      - SORI_LIVEKIT_HOST=${SORI_LIVEKIT_HOST:-sori-livekit.sori.orb.local}
      - SORI_MEDIA_HOST=${SORI_MEDIA_HOST:-sori-media.sori.orb.local}
      - CADDY_ACME_EMAIL=${CADDY_ACME_EMAIL:-}
    volumes:
      - ${SORI_GATEWAY_CADDYFILE:-./infrastructure/caddy/Caddyfile}:/etc/caddy/Caddyfile:ro
      - ./infrastructure/ssl:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - sori-web
      - sori-backend
      - sori-livekit
      - sori-media
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sori-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  valkey:
    image: valkey/valkey:latest
    ports:
      - "${VALKEY_BIND_ADDRESS:-127.0.0.1}:${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkey_data:/data
    networks:
      - sori-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  sori-media:
    image: minio/minio:latest
    ports:
      - "${MINIO_BIND_ADDRESS:-127.0.0.1}:${MINIO_PORT:-9000}:9000"
      - "${MINIO_BIND_ADDRESS:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - sori-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  sori-livekit:
    image: livekit/livekit-server:latest
    ports:
      # Signaling port will be handled by gateway on 443
      - "${LIVEKIT_BIND_ADDRESS:-0.0.0.0}:${LIVEKIT_TCP_PORT:-7881}:7881"
      - "${LIVEKIT_BIND_ADDRESS:-0.0.0.0}:${LIVEKIT_UDP_PORT:-7882}:7882/udp"
    expose:
      - "7880"
    command: --config /etc/livekit.yaml
    environment:
      - "LIVEKIT_KEYS=${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    volumes:
      - ${SORI_LIVEKIT_CONFIG:-./infrastructure/livekit.yaml}:/etc/livekit.yaml:ro
    networks:
      - sori-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  sori-db-migrate:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: builder
    command: npm run db:migrate -w @sori/backend
    environment:
      - NODE_ENV=${NODE_ENV}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - VALKEY_URL=${VALKEY_URL}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - LIVEKIT_URL=${LIVEKIT_URL}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - PUBLIC_WEB_URL=${PUBLIC_WEB_URL}
      - PUBLIC_API_URL=${PUBLIC_API_URL}
      - PUBLIC_WS_URL=${PUBLIC_WS_URL}
      - PUBLIC_LIVEKIT_URL=${PUBLIC_LIVEKIT_URL}
      - PUBLIC_MEDIA_URL=${PUBLIC_MEDIA_URL}
      - PUBLIC_DEFAULT_COMMUNITY_ID=${PUBLIC_DEFAULT_COMMUNITY_ID:-default-community}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    depends_on:
      - postgres
    networks:
      - sori-network
    profiles:
      - tools

  sori-install-bootstrap:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: builder
    command: npm run db:bootstrap -w @sori/backend
    environment:
      - NODE_ENV=${NODE_ENV}
      - INSTALL_DOMAIN=${INSTALL_DOMAIN}
      - SORI_SERVER_NAME=${SORI_SERVER_NAME}
      - ADMIN_PANEL_LOGIN=${ADMIN_PANEL_LOGIN}
      - ADMIN_PANEL_PASSWORD=${ADMIN_PANEL_PASSWORD}
      - ADMIN_PANEL_EMAIL=${ADMIN_PANEL_EMAIL}
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - VALKEY_URL=${VALKEY_URL}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET=${S3_BUCKET}
      - LIVEKIT_URL=${LIVEKIT_URL}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - PUBLIC_WEB_URL=${PUBLIC_WEB_URL}
      - PUBLIC_API_URL=${PUBLIC_API_URL}
      - PUBLIC_WS_URL=${PUBLIC_WS_URL}
      - PUBLIC_LIVEKIT_URL=${PUBLIC_LIVEKIT_URL}
      - PUBLIC_MEDIA_URL=${PUBLIC_MEDIA_URL}
      - PUBLIC_DEFAULT_COMMUNITY_ID=${PUBLIC_DEFAULT_COMMUNITY_ID:-default-community}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    depends_on:
      - postgres
    networks:
      - sori-network
    profiles:
      - tools

networks:
  sori-network:
    driver: bridge

volumes:
  postgres_data:
  sori_media:
  valkey_data:
  minio_data:
  caddy_data:
  caddy_config:
