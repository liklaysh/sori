# --- Sori Central Gateway Configuration ---

# Handle WebSocket upgrading
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name .sori.orb.local;
    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name .sori.orb.local;

    ssl_certificate /etc/nginx/ssl/sori-wildcard.crt;
    ssl_certificate_key /etc/nginx/ssl/sori-wildcard.key;

    # SSL optimization
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # --- 1. Sori Web (Frontend) ---
    location / {
        # Check if the host matches sori-web
        if ($host = "sori-web.sori.orb.local") {
            proxy_pass http://sori-web:80;
        }
        
        # Check if the host matches sori-backend
        if ($host = "sori-backend.sori.orb.local") {
            proxy_pass http://sori-backend:3000;
        }

        # Check if the host matches sori-livekit
        if ($host = "sori-livekit.sori.orb.local") {
            proxy_pass http://sori-livekit:7880;
        }

        # Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket Support (Important for Socket.io and LiveKit)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;
        
        # Increase timeouts for long-lived connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
